x-common-env: &common-env
  DJANGO_SETTINGS_MODULE: config.settings.development

services:
  migrate:
    build:
      context: .
      target: builder
    command: >
      sh -c "python manage.py makemigrations users notifications --noinput &&
           python manage.py migrate --noinput &&
           python manage.py collectstatic --noinput"
    volumes:
      - .:/app
      - static_vol:/app/staticfiles
    env_file: .env
    environment:
      <<: *common-env
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  web:
    build:
      context: .
      target: builder
    command: daphne -b 0.0.0.0 -p 8000 config.asgi:application
    volumes:
      - .:/app
      - static_vol:/app/staticfiles
      - media_vol:/app/media
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      <<: *common-env
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      target: builder
    command: celery -A celery_app.celery worker -l INFO --concurrency=4
    volumes:
      - .:/app
    env_file: .env
    environment:
      <<: *common-env
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

  beat:
    build:
      context: .
      target: builder
    command: celery -A celery_app.celery beat -l INFO --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    env_file: .env
    environment:
      <<: *common-env
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME:-django_db}
      POSTGRES_USER: ${DB_USER:-django_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "5432:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-django_user} -d ${DB_NAME:-django_db}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db
    profiles:
      - tools

volumes:
  postgres_data:
  redis_data:
  static_vol:
  media_vol:
