# ── pytest.ini ────────────────────────────────────────────────────
[pytest]
DJANGO_SETTINGS_MODULE = config.settings.development
python_files  = test_*.py *_test.py
python_classes= Test*
python_functions = test_*
asyncio_mode  = auto
addopts =
    --reuse-db
    --tb=short
    -v
    --cov=apps
    --cov=core
    --cov-report=term-missing
    --cov-report=html:htmlcov